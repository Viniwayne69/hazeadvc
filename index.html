  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #020b19;
      color: #ffffff;
      font-family: "Montserrat", system-ui, sans-serif;
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 50% 0%, rgba(203, 174, 65, .2), transparent 12rem),
        radial-gradient(circle at 78% 12%, rgba(18, 63, 112, .34), transparent 14rem),
        linear-gradient(160deg, #020b19 0%, #031632 48%, #062f5a 100%);
    }

    a,
    button {
      color: inherit;
      text-decoration: none;
      font: inherit;
      border: 0;
      cursor: default;
    }

    .page {
      width: min(506px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 34px calc(20px + env(safe-area-inset-bottom, 0px));
      overflow: hidden;
    }

    .panelBody {
      width: 100%;
      margin: 0 auto;
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .panelHero {
      position: relative;
      width: 100%;
      display: grid;
      justify-items: center;
      padding: 0 0 14px;
    }

    .panelHero::before {
      content: "";
      position: absolute;
      top: -10px;
      width: min(320px, 86%);
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255, 238, 0, .2), rgba(0, 178, 235, .12) 48%, transparent 76%);
      filter: blur(12px);
      pointer-events: none;
    }

    .panelLogo {
      position: relative;
      width: clamp(112px, 31vw, 154px);
      aspect-ratio: 1;
      margin: 0 0 14px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      box-shadow:
        0 16px 30px rgba(0, 7, 34, .4),
        0 0 0 4px rgba(255, 238, 0, .9),
        0 0 0 9px rgba(255, 255, 255, .14);
    }

    .title {
      position: relative;
      max-width: 380px;
      color: #ffffff;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(40px, 10.4vw, 54px);
      line-height: .94;
      font-weight: 800;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: 0 3px 18px rgba(0, 7, 34, .62);
    }

    .tagline {
      position: relative;
      max-width: 400px;
      margin-top: 12px;
      color: rgba(255, 255, 255, .95);
      font-size: 14px;
      line-height: 1.42;
      font-weight: 800;
    }

    .tagline strong {
      color: #ffef00;
      font-weight: 900;
    }

    .divider {
      width: 100%;
      height: 1px;
      margin: 0 0 18px;
      background: linear-gradient(90deg, transparent, rgba(255, 238, 0, .34), transparent);
    }

    .quickActions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 20px;
    }

    .quickButton {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, .24);
      background: rgba(255, 255, 255, .12);
      text-decoration: none;
      box-shadow: 0 12px 20px rgba(0, 7, 34, .22);
      transition: transform .16s ease, filter .16s ease;
    }

    .quickButton.whatsapp {
      background: #25d366;
    }

    .quickButton.instagram {
      background: radial-gradient(circle at 30% 105%, #fdf497 0 16%, #fd5949 42%, #d6249f 68%, #285aeb 100%);
    }

    .quickButton.facebook {
      background: #1877f2;
    }

    .quickButton.site {
      color: #001145;
      background: #ffef00;
    }

    .quickButton:active {
      transform: scale(.92);
      filter: brightness(.94);
    }

    .actions {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .actionButton {
      position: relative;
      min-height: 67px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 15px;
      border-radius: 19px;
      color: #ffffff;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .1);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .18),
        0 17px 30px rgba(0, 7, 34, .24);
      transition: transform .18s ease, filter .18s ease, border-color .18s ease;
      min-width: 0;
      overflow: hidden;
    }

    .actionButton::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 18px;
      background: linear-gradient(120deg, rgba(255, 255, 255, .18), transparent 40%, rgba(255, 255, 255, .08));
      pointer-events: none;
      opacity: .62;
    }

    .actionButton:active {
      transform: scale(.97);
      filter: brightness(.94);
    }

    .actionButton.siteMain {
      color: #001145;
      background:
        radial-gradient(circle at 92% 10%, rgba(255, 255, 255, .72), transparent 7rem),
        linear-gradient(135deg, #fffb4c 0%, #ffef00 52%, #f0bc00 100%);
      border-color: rgba(255, 255, 255, .52);
    }

    .actionButton.whatsappMain {
      background:
        radial-gradient(circle at 92% 12%, rgba(255, 255, 255, .26), transparent 7rem),
        linear-gradient(135deg, #35e77d 0%, #25d366 46%, #088a3d 100%);
      border-color: rgba(214, 255, 229, .56);
    }

    .actionButton.offersMain {
      background:
        radial-gradient(circle at 90% 12%, rgba(255, 238, 0, .28), transparent 7rem),
        linear-gradient(135deg, #0031d7 0%, #001bb0 54%, #000d54 100%);
      border-color: rgba(255, 238, 0, .58);
    }

    .actionButton.instagramMain {
      background:
        radial-gradient(circle at 88% 12%, rgba(255, 238, 0, .18), transparent 7rem),
        linear-gradient(135deg, #405de6 0%, #833ab4 36%, #e1306c 70%, #f77737 100%);
      border-color: rgba(255, 255, 255, .38);
    }

    .actionButton.facebookMain {
      background:
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, .18), transparent 7rem),
        linear-gradient(135deg, #1877f2 0%, #0f5fcb 50%, #0a3178 100%);
      border-color: rgba(205, 225, 255, .46);
    }

    .actionButton.locationMain {
      background:
        radial-gradient(circle at 90% 12%, rgba(255, 238, 0, .18), transparent 7rem),
        linear-gradient(135deg, #00aeea 0%, #0064c7 52%, #001863 100%);
      border-color: rgba(169, 239, 255, .52);
    }

    .iconWrap {
      position: relative;
      z-index: 1;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: inherit;
      background: rgba(255, 255, 255, .95);
      border: 1px solid rgba(255, 255, 255, .2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .36),
        0 9px 16px rgba(0, 7, 34, .2);
    }

    .actionButton.siteMain .iconWrap {
      color: #ffef00;
      background: #001145;
    }

    .actionButton.whatsappMain .iconWrap {
      color: #ffffff;
      background: #25d366;
    }

    .actionButton.offersMain .iconWrap {
      color: #001145;
      background: #ffef00;
    }

    .actionButton.instagramMain .iconWrap {
      color: #ffffff;
      background: radial-gradient(circle at 30% 105%, #fdf497 0 16%, #fd5949 42%, #d6249f 68%, #285aeb 100%);
    }

    .actionButton.facebookMain .iconWrap {
      color: #ffffff;
      background: #1877f2;
    }

    .actionButton.locationMain .iconWrap {
      color: #0047b9;
      background: #ffffff;
    }

    .actionCopy {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      gap: 3px;
      text-align: left;
      overflow: hidden;
    }

    .actionCopy strong {
      color: inherit;
      font-size: 18px;
      line-height: 1.12;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0, 7, 34, .42);
    }

    .actionCopy span {
      color: rgba(255, 255, 255, .96);
      font-size: 12.4px;
      line-height: 1.32;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0, 7, 34, .42);
      overflow-wrap: anywhere;
    }

    .actionButton.siteMain .actionCopy strong,
    .actionButton.siteMain .actionCopy span {
      color: #001145;
      text-shadow: none;
    }

    .signature {
      margin-top: 15px;
      color: rgba(255, 255, 255, .68);
      font-size: 10.5px;
      line-height: 1.4;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    @media (hover: hover) and (pointer: fine) {
      .actionButton:hover,
      .quickButton:hover {
        transform: translateY(-2px);
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 16px;
        padding-right: 16px;
      }

      .actionButton {
        gap: 12px;
        padding-left: 13px;
        padding-right: 13px;
      }

      .iconWrap {
        width: 39px;
        height: 39px;
        flex-basis: 39px;
      }

      .actionCopy strong {
        font-size: 16px;
      }

      .actionCopy span {
        font-size: 11.8px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="panelBody">
      <div class="panelHero">
        <img class="panelLogo" src="./logo.png" alt="Silva & Rezende Advocacia">
        <h1 class="title">Haze<br>Advocacia</h1>
        <p class="tagline">Advogado com atendimento jurídico humanizado, orientação clara e acompanhamento próximo para cada caso.</p>

        <button class="quickButton site" type="button" aria-label="Site oficial">

          </svg>
        </button>
      </div>

      <div class="divider"></div>

      <div class="actions">
        <button class="actionButton siteMain" type="button">
          <span class="iconWrap" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M2 12h20"></path>
              <path d="M12 2c2.5 2.8 4 6.2 4 10s-1.5 7.2-4 10c-2.5-2.8-4-6.2-4-10s1.5-7.2 4-10z"></path>
            </svg>
          </span>
          <span class="actionCopy">
            <strong>Nosso site</strong>
            <span>Conheça a Haze Advocacia e veja os serviços jurídicos</span>
          </span>
        </button>

        <button class="actionButton whatsappMain" type="button">
          <span class="iconWrap" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97c-.27-.1-.47-.15-.67.15c-.2.3-.77.97-.94 1.16c-.17.2-.35.22-.64.08c-.3-.15-1.26-.46-2.39-1.48c-.88-.79-1.48-1.76-1.65-2.06c-.17-.3-.02-.46.13-.61c.13-.13.3-.35.45-.52c.15-.17.2-.3.3-.5c.1-.2.05-.37-.03-.52c-.07-.15-.67-1.61-.92-2.21c-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37c-.27.3-1.04 1.02-1.04 2.48c0 1.46 1.07 2.88 1.21 3.07c.15.2 2.1 3.2 5.08 4.49c.71.31 1.26.49 1.69.63c.71.23 1.36.2 1.87.12c.57-.09 1.76-.72 2.01-1.41c.25-.69.25-1.29.17-1.41c-.07-.12-.27-.2-.57-.35"></path>

        <button class="actionButton offersMain" type="button">

        <button class="actionButton instagramMain" type="button">

          </span>
          <span class="actionCopy">
            <strong>Instagram</strong>
            <span>Acompanhe conteúdos, orientações e atualizações</span>

        <button class="actionButton facebookMain" type="button">
          <span class="iconWrap" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M14 8.5V6.8c0-.8.5-1.3 1.4-1.3H17V2.3c-.8-.1-1.7-.2-2.5-.2-2.7 0-4.5 1.6-4.5 4.5v1.9H7v3.6h3v9.8h3.7v-9.8h3l.5-3.6H14z"></path>
            </svg>
          </span>
          <span class="actionCopy">
            <strong>Facebook</strong>
            <span>Acesse a página oficial e acompanhe as publicações</span>
          </span>

        <button class="actionButton locationMain" type="button">
          <span class="iconWrap" aria-hidden="true">
            <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">

      <p class="signature">Feito com HazeLink para Haze Advocacia</p>
    </div>
  </main>
</body>
